<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barter Finance | Soluções Imobiliárias e Financeiras</title>
    <style>
        :root { 
            --navy: #0a1b3d; 
            --gold: #c5a059; 
            --bg: #ffffff; 
            --text: #0a1b3d; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; text-align: center; }
        .container { max-width: 800px; margin: auto; padding: 60px 20px; }
        .logo { width: 220px; margin-bottom: 25px; }
        h1 { color: var(--navy); font-size: 1.8em; text-transform: uppercase; margin: 10px 0; }
        .subtitle { color: var(--navy); opacity: 0.8; font-size: 1.1em; margin-bottom: 30px; }
        .divider { width: 60px; height: 3px; background: var(--navy); margin: 0 auto 40px auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; margin-top: 40px; }
        .card { background: #f9f9f9; padding: 40px 30px; border-radius: 4px; border: 1px solid #e0e0e0; }
        .btn { background: var(--navy); color: #fff; padding: 12px 30px; text-decoration: none; border-radius: 2px; font-weight: bold; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="Barter Finance Logo" class="logo">
        <h1>BARTER FINANCE</h1>
        <p class="subtitle">Soluções que geram resultados</p>
        <div class="divider"></div>

        <div class="grid">
            <div class="card">
                <h3>Crédito Consignado</h3>
                <a href="https://wa.me/558396657809?text=Olá,%20gostaria%20de%20mais%20informações%20sobre%20Crédito%20Consignado." class="btn" target="_blank">Simular Crédito</a>
            </div>
            <div class="card">
                <h3>Mercado Imobiliário</h3>
                <a href="https://wa.me/558396657809?text=Olá,%20gostaria%20de%20conhecer%20os%20imóveis." class="btn" target="_blank">Ver Imóveis</a>
            </div>
        </div>
    </div>
</body>
</html>
