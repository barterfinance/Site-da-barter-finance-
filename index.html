<style>
    :root { 
        --navy: #0a1b3d; /* Azul Safra */
        --gold: #c5a059; 
        --bg: #ffffff;    /* Fundo Branco Puro */
        --text: #0a1b3d;  /* Texto em Azul */
    }
    body { 
        font-family: 'Segoe UI', sans-serif; 
        background: var(--bg); 
        color: var(--text); 
        margin: 0; 
        text-align: center; 
    }
    .container { max-width: 800px; margin: auto; padding: 60px 20px; }
    
    /* Configuração para a logo azul sobre fundo branco */
    .logo { width: 220px; margin-bottom: 25px; }
    
    h1 { color: var(--navy); font-size: 1.8em; text-transform: uppercase; letter-spacing: 1px; }
    .subtitle { color: var(--navy); opacity: 0.8; font-size: 1.1em; margin-bottom: 30px; }
    .divider { width: 60px; height: 3px; background: var(--navy); margin: 0 auto 40px auto; }
    
    /* Cards com borda azul e fundo claro */
    .card { 
        background: #f9f9f9; 
        padding: 40px 30px; 
        border-radius: 4px; 
        border: 1px solid #e0e0e0; 
    }
    .btn { 
        background: var(--navy); 
        color: #fff; 
        padding: 12px 30px; 
        text-decoration: none; 
        border-radius: 2px; 
    }
</style>
