<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barter Finance | Soluções Imobiliárias e Financeiras</title>
    <style>
        :root { --gold: #c5a059; --dark: #121212; --gray: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: #fff; margin: 0; }
        .container { max-width: 900px; margin: auto; padding: 20px; text-align: center; }
        header { padding: 50px 0; border-bottom: 1px solid var(--gold); }
        h1 { color: var(--gold); font-size: 2.5em; margin: 10px 0; text-transform: uppercase; }
        h2 { color: var(--gold); margin-top: 40px; }
        .subtitle { color: #aaa; font-size: 1.1em; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--gray); padding: 20px; border: 1px solid #333; border-radius: 4px; }
        .btn { display: inline-block; margin-top: 15px; padding: 12px 25px; border: 1px solid var(--gold); color: var(--gold); text-decoration: none; transition: 0.3s; }
        .btn:hover { background: var(--gold); color: var(--dark); }
    </style>
</head>
<body>
    <header class="container">
        <h1>BARTER FINANCE</h1>
        <p class="subtitle">Soluções Imobiliárias e Financeiras</p>
    </header>

    <main class="container">
        <h2>Catálogo de Oportunidades</h2>
        <div class="grid">
            <div class="card">
                <h3>Crédito Consignado</h3>
                <p>Serviços de crédito e investimento.</p>
                <a href="https://wa.me/5583999999999?text=Quero%20simular%20consignado%20na%20Barter%20Finance" class="btn">Solicitar Simulação</a>
            </div>
            <div class="card">
                <h3>Imóveis</h3>
                <p>Financiamento imobiliário e oportunidades.</p>
                <a href="https://wa.me/5583999999999?text=Quero%20ver%20imóveis%20na%20Barter%20Finance" class="btn">Ver Catálogo</a>
            </div>
        </div>
    </main>
</body>
</html>
